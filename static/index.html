<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Norma tablet</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
        }
        .wrap {
            display: block;
            text-align: center;
            padding: 2em 1em;
        }
        h1 {
            font-size: 2em;
            margin: 0 0 1em 0;
        }
        button {
            font-size: 1.2em;
            padding: 0.8em 1.2em;
            background: #4a90e2;
            color: #fff;
            border: 0;
            border-radius: 0.4em;
            margin: 0.4em;
            min-width: 160px;
            cursor: pointer;
        }
        input[type="text"] {
            width: 100%;
            max-width: 320px;
            padding: 0.8em;
            margin-top: 1em;
            border-radius: 0.4em;
            border: 1px solid #4a90e2;
            background: #0f1340;
            color: #fff;
            font-size: 1em;
        }
        #status {
            margin-top: 1.2em;
            font-size: 0.95em;
            min-height: 6em;
            white-space: pre-wrap;
            text-align: left;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(255,255,255,0.05);
            padding: 1em;
            border-radius: 0.5em;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Norma Control</h1>
        <div>
            <button onclick="sayHello()">Sig hej</button>
            <button onclick="playGesture()">Spil gesture</button>
            <button onclick="hideTablet()">Skjul tablet</button>
            <button onclick="getStatus()">Hent status</button>
        </div>
        <div>
            <input id="customText" type="text" placeholder="Skriv tekst til Norma" />
        </div>
        <div>
            <button onclick="sayText()">Sig tekst</button>
        </div>
        <div id="status">Status vises her...</div>
    </div>

    <script>
        function setStatus(value) {
            var status = document.getElementById('status');
            status.textContent = value;
        }

        function call(command, params) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/command', true);
            xhr.setRequestHeader('Content-Type', 'application/json;charset=utf-8');

            xhr.onreadystatechange = function () {
                if (xhr.readyState !== 4) {
                    return;
                }
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        setStatus(JSON.stringify(data, null, 2));
                    } catch (e) {
                        setStatus('Ugyldigt svar fra bridge: ' + xhr.responseText);
                    }
                } else {
                    setStatus('Fejl ' + xhr.status + ': ' + xhr.responseText);
                }
            };

            xhr.send(JSON.stringify({command: command, params: params || {}}));
            setStatus('Sender ' + command + '...');
        }

        function sayHello() {
            call('say', {text: 'Hej Norma'});
        }

        function playGesture() {
            call('play_gesture', {gesture_name: 'hello'});
        }

        function hideTablet() {
            call('hide_tablet', {});
        }

        function getStatus() {
            call('get_status', {});
        }

        function sayText() {
            var input = document.getElementById('customText');
            call('say', {text: input.value || 'Hej Norma'});
        }
    </script>
</body>
</html>
