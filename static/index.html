<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pepper tablet</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
        }
        .wrap {
            display: block;
            text-align: center;
            padding: 2em 1em;
        }
        h1 {
            font-size: 2em;
            margin: 0 0 1em 0;
        }
        button {
            font-size: 1.2em;
            padding: 0.8em 1.2em;
            background: #4a90e2;
            color: #fff;
            border: 0;
            border-radius: 0.4em;
            margin: 0.4em;
            min-width: 160px;
            cursor: pointer;
        }
        input[type="text"] {
            width: 100%;
            max-width: 320px;
            padding: 0.8em;
            margin-top: 1em;
            border-radius: 0.4em;
            border: 1px solid #4a90e2;
            background: #0f1340;
            color: #fff;
            font-size: 1em;
        }
        #status {
            margin-top: 1.2em;
            font-size: 0.95em;
            min-height: 6em;
            white-space: pre-wrap;
            text-align: left;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(255,255,255,0.05);
            padding: 1em;
            border-radius: 0.5em;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Pepper Control</h1>
        <div>
            <button onclick="Commands.sayHello()">Say hello</button>
            <button onclick="Commands.playGesture()">Play gesture</button>
            <button onclick="Commands.hideTablet()">Hide tablet</button>
            <button onclick="Commands.getStatus()">Status</button>
        </div>
        <div>
            <input id="customText" type="text" placeholder="Write text for Pepper" />
        </div>
        <div>
            <button onclick="Commands.sayText()">Say text</button>
        </div>
        <div id="status">Status vises her...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
